<div id="rating-summary" class="flex items-center gap-2">
  {% if aggregate.count %}
    <span class="text-amber-500 font-semibold">{{ aggregate.avg|floatformat:1 }} / 5</span>
    <span class="text-slate-500 text-sm">
      ({{ aggregate.count }} review{{ aggregate.count|pluralize }})
    </span>
  {% else %}
    <span class="text-slate-500 text-sm">No ratings yet</span>
  {% endif %}
</div>
