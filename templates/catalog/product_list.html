{% extends "base.html" %}
{% block title %}Products · CloudTalk Reviews{% endblock %}

{% block content %}
<section class="mb-6">
  <h1 class="text-2xl font-semibold mb-4">Products</h1>
  <form hx-get="{% url 'catalog:product-list' %}"
        hx-target="#product-grid"
        hx-swap="outerHTML"
        hx-push-url="true"
        hx-trigger="change, keyup changed delay:400ms from:input[name='q']"
        class="grid grid-cols-1 md:grid-cols-4 gap-3">
    <input type="text" name="q" value="{{ filter_form.q.value|default:'' }}"
           placeholder="Search products…"
           class="md:col-span-2 px-3 py-2 border border-slate-300 rounded" />
    <select name="category" class="px-3 py-2 border border-slate-300 rounded">
      <option value="">All categories</option>
      {% for category in filter_form.category.field.queryset %}
        <option value="{{ category.pk }}"
                {% if filter_form.category.value|stringformat:'s' == category.pk|stringformat:'s' %}selected{% endif %}>
          {{ category.name }}
        </option>
      {% endfor %}
    </select>
    <select name="sort" class="px-3 py-2 border border-slate-300 rounded">
      {% for value, label in filter_form.sort.field.choices %}
        <option value="{{ value }}"
                {% if filter_form.sort.value == value %}selected{% endif %}>
          {{ label }}
        </option>
      {% endfor %}
    </select>
    <noscript>
      <div class="md:col-span-4">
        <button type="submit"
                class="px-4 py-2 bg-slate-900 text-white rounded hover:bg-slate-700">
          Apply
        </button>
      </div>
    </noscript>
  </form>
</section>

{% include "catalog/partials/_product_grid.html" %}
{% endblock %}
